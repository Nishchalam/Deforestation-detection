# Base Configuration for Deforestation Detection Experiments

experiment:
  name: "base"
  seed: 42
  device: "cuda" # "cuda" or "cpu"

dataset:
  name: "EuroSAT"
  num_classes: 10
  image_size: 224 # Target resize for images
  batch_size: 32
  num_workers: 4
  pin_memory: true
  
training:
  epochs: 20
  loss: "cross_entropy"
  optimizer:
    name: "adam"
    lr: 0.001
    weight_decay: 0.0001
  scheduler:
    name: "reduce_lr_on_plateau"
    patience: 3
    factor: 0.1
    mode: "min"

callbacks:
  early_stopping:
    enabled: true
    patience: 7
    monitor: "val_loss"
    mode: "min"
  model_checkpoint:
    enabled: true
    monitor: "val_accuracy"
    mode: "max"
  tensorboard:
    enabled: true
  csv_logger:
    enabled: true

augmentation:
  horizontal_flip: true
  vertical_flip: true
  rotation: 15
